name: API Tests

on:
  push:
    paths:
      - "api_min.py"
      - "app/**"
      - "crud.py"
      - "db.py"
      - "models.py"
      - "path_utils.py"
      - "UI.py"
      - "desktop/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/api-test.yml"
  pull_request:
    paths:
      - "api_min.py"
      - "app/**"
      - "crud.py"
      - "db.py"
      - "models.py"
      - "path_utils.py"
      - "UI.py"
      - "desktop/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/api-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: |
          PYTHONPATH=. python -m pytest -q tests/test_api_min.py
