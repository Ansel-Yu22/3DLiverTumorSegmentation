services:
  api:
    image: liver-seg-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/model/checkpoint/best_model.pth
      RESULT_DIR: /app/doc/result
      UPLOAD_DIR: /app/doc/upload
      DB_URL: mysql+pymysql://root:your_password@host.docker.internal:3306/liver_seg?charset=utf8mb4
    volumes:
      - ./model/checkpoint:/app/model/checkpoint
      - ./doc:/app/doc
    restart: unless-stopped
