services:
  api:
    image: liver-seg-api:latest
    build:
      context: ..
      dockerfile: Deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/Model/checkpoint/best_model.pth
      RESULT_DIR: /app/Docs/result
      UPLOAD_DIR: /app/Docs/uploads
      DB_PATH: /app/Docs/jobs.db
    volumes:
      - ../Model/checkpoint:/app/Model/checkpoint
      - ../Docs:/app/Docs
    restart: unless-stopped
